<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CareerNest - Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS riêng -->
    <link rel="stylesheet" href="assets/css/Login.css">
</head>
  <body>
    
        <div class="container login-container d-flex justify-content-center align-items-center">
        <div class="row login-card shadow-lg bg-white w-100" style="max-width: 900px;">
          <a href="index.html" class="back-home">
        <i data-lucide="arrow-left" style="width: 16px;"></i>
        Quay lại trang chủ
      </a>

            <!-- LEFT IMAGE -->
            <div class="col-md-6 left-side d-none d-md-block">
                <img src="assets/img/image_poster.png" alt="Poster">
            </div>

            <!-- RIGHT LOGIN -->
            <div class="col-md-6 d-flex align-items-center justify-content-center">

                <div class="form-wrapper">

                    <div class="text-center mb-4">
                        <h3 class="fw-bold">
                            <span class="career">Career</span><span class="nest">Nest</span>
                        </h3>
                        <p class="text-muted">Định hướng đúng - Tương lai sáng</p>
                    </div>

                    <div id="error" class="text-danger text-center mb-3"></div>

                    <form id="loginForm">

                        <div class="mb-3 input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input type="text" id="username" class="form-control" placeholder="Tên đăng nhập">
                        </div>

                        <div class="mb-3 input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" id="password" class="form-control" placeholder="Mật khẩu">
                        </div>

                        <div class="d-flex justify-content-between mb-3">
                            <div>
                                <input type="checkbox" id="remember">
                                <label for="remember">Ghi nhớ tôi</label>
                            </div>
                            <a href="#" class="text-decoration-none">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Đăng nhập
                        </button>

                        <div class="text-center mt-4">
                            <span class="text-muted">Chưa có tài khoản? </span>
                            <a href="#" class="register-link">Đăng ký ngay</a>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
        <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS riêng -->
    <script src="assets/js/Login.js"></script>
  </body>
</html>
