<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - CareerNest</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="assets/css/Login.css">
  </head>
  <body>
    <div class="login-container">
      <a href="index.html" class="back-home">
        <i data-lucide="arrow-left" style="width: 16px;"></i>
        Quay lại trang chủ
      </a>

      <div class="logo-section">
        <div class="logo-icon"><i data-lucide="brain"></i></div>
      </div>

      <h1 class="login-title">Chào mừng trở lại</h1>
      <p class="login-subtitle">Đăng nhập để tiếp tục hành trình của bạn</p>
      
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="text" class="form-input" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Đăng nhập</button>
      </form>

      <div class="login-footer">
        Chưa có tài khoản? <a href="#">Đăng ký ngay</a>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      // Initialize Lucide Icons
      lucide.createIcons();

      const loginForm = document.getElementById('login-form');
      loginForm?.addEventListener('submit', (e) => {
        e.preventDefault();
        const emailInput = loginForm.querySelector('input[type="text"]');
        const passwordInput = loginForm.querySelector('input[type="password"]');
        
        const email = emailInput.value;
        const password = passwordInput.value;

        if (email === 'admin@123' && password === '123456') {
          alert('Đăng nhập Admin thành công!');
          window.location.href = 'Admin.html';
        } else {
          alert('Đăng nhập thành công! (Đây là bản demo)');
          window.location.href = 'index.html';
        }
      });
    </script>
  </body>
</html>
